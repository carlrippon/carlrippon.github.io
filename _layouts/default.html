<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} · {% endif %}Carl Rippon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#102A30; --ink-2:#33514F; --salt:#EBEFEE; --paper:#FBFCFB;
    --line:#D2DAD8; --sea:#2E7D86; --coral:#D2563A; --mute:#6C7E7C;
    --display:'Fraunces',Georgia,'Times New Roman',serif;
    --body:'Inter',system-ui,-apple-system,sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --maxw:1080px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:var(--salt);color:var(--ink);font-family:var(--body);
    font-size:17px;line-height:1.65;-webkit-font-smoothing:antialiased;}
  a{color:inherit;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px;}

  .eyebrow{font-family:var(--mono);font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;
    color:var(--mute);margin:0 0 1.1rem;display:flex;align-items:center;gap:.7rem;}
  .eyebrow::before{content:"";width:26px;height:1px;background:var(--coral);display:inline-block;}

  /* nav */
  .nav{position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--salt) 88%,transparent);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
  .nav-inner{max-width:var(--maxw);margin:0 auto;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;}
  .brand{font-family:var(--display);font-weight:600;font-size:1.15rem;letter-spacing:-.01em;text-decoration:none;}
  .brand span{color:var(--coral);}
  .nav-links{display:flex;gap:1.6rem;list-style:none;margin:0;padding:0;}
  .nav-links a{text-decoration:none;font-size:.82rem;font-family:var(--mono);letter-spacing:.04em;color:var(--ink-2);padding:4px 0;position:relative;}
  .nav-links a::after{content:"";position:absolute;left:0;bottom:-2px;width:0;height:1.5px;background:var(--coral);transition:width .25s ease;}
  .nav-links a:hover::after,.nav-links a:focus-visible::after{width:100%;}
  .nav-toggle{display:none;background:none;border:1px solid var(--line);border-radius:6px;padding:7px 10px;font-family:var(--mono);font-size:.75rem;color:var(--ink);cursor:pointer;}

  /* sections */
  section{padding:clamp(52px,8vw,92px) 0;}
  .sec-head{font-family:var(--display);font-weight:500;font-size:clamp(1.6rem,3vw,2.4rem);letter-spacing:-.015em;margin:.2rem 0 1rem;}
  .intro{color:var(--ink-2);max-width:60ch;margin:0 0 2.6rem;font-size:1.08rem;}

  /* blog index */
  .post-list{display:flex;flex-direction:column;}
  .post-row{display:grid;grid-template-columns:130px 1fr;gap:28px;padding:24px 0;border-top:1px solid var(--line);
    text-decoration:none;align-items:baseline;transition:padding-left .2s ease;}
  .post-row:hover,.post-row:focus-visible{padding-left:8px;}
  .post-row:last-child{border-bottom:1px solid var(--line);}
  .post-row .date{font-family:var(--mono);font-size:.74rem;color:var(--mute);letter-spacing:.02em;}
  .post-row .ptitle{font-family:var(--display);font-weight:500;font-size:1.24rem;line-height:1.25;color:var(--ink);grid-column:2;}
  .post-row .excerpt{grid-column:2;color:var(--ink-2);font-size:1rem;margin-top:.35rem;}

  /* single post */
  .post{padding:clamp(48px,7vw,80px) 0;}
  .post-date{font-family:var(--mono);font-size:.76rem;letter-spacing:.04em;color:var(--mute);margin:1.4rem 0 .4rem;}
  .post-title{font-family:var(--display);font-weight:500;font-size:clamp(2rem,4vw,3rem);line-height:1.08;letter-spacing:-.02em;margin:0 0 2rem;max-width:20ch;}
  .post-body{max-width:68ch;font-size:1.14rem;}
  .post-body p{margin:0 0 1.3rem;}
  .post-body h2{font-family:var(--display);font-weight:500;font-size:1.5rem;letter-spacing:-.01em;margin:2.6rem 0 1rem;}
  .post-body h3{font-family:var(--display);font-weight:500;font-size:1.2rem;margin:2rem 0 .8rem;}
  .post-body a{color:var(--sea);text-decoration:none;border-bottom:1px solid var(--line);transition:border-color .2s;}
  .post-body a:hover{border-color:var(--sea);}
  .post-body ul,.post-body ol{margin:0 0 1.3rem;padding-left:1.3rem;}
  .post-body li{margin:.3rem 0;}
  .post-body blockquote{margin:1.6rem 0;padding:.4rem 0 .4rem 1.4rem;border-left:3px solid var(--coral);color:var(--ink-2);font-style:italic;}
  .post-body code{font-family:var(--mono);font-size:.9em;background:var(--paper);border:1px solid var(--line);border-radius:5px;padding:.1em .35em;}
  .post-body pre{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:18px;overflow:auto;}
  .post-body pre code{border:none;background:none;padding:0;}
  .post-body img{max-width:100%;height:auto;border-radius:8px;}
  .backlink{display:inline-block;font-family:var(--mono);font-size:.78rem;color:var(--sea);text-decoration:none;margin:1.6rem 0;}
  .backlink:hover{text-decoration:underline;}

  footer{border-top:1px solid var(--line);padding:30px 0;}
  .foot-inner{display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;font-family:var(--mono);font-size:.72rem;color:var(--mute);letter-spacing:.03em;}
  :focus-visible{outline:2px solid var(--coral);outline-offset:3px;border-radius:3px;}

  @media (max-width:820px){
    .nav-links{position:absolute;top:100%;right:0;left:0;flex-direction:column;gap:0;background:var(--paper);border-bottom:1px solid var(--line);padding:8px 28px 16px;display:none;}
    .nav-links.open{display:flex;}
    .nav-links a{padding:11px 0;border-top:1px solid var(--line);}
    .nav-toggle{display:inline-block;}
    .post-row{grid-template-columns:1fr;gap:6px;}
    .post-row .ptitle,.post-row .excerpt{grid-column:1;}
  }
</style>
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <a class="brand" href="/">Carl <span>Rippon</span></a>
    <button class="nav-toggle" aria-expanded="false" aria-controls="nav-links">Menu</button>
    <ul class="nav-links" id="nav-links">
      <li><a href="/#about">About</a></li>
      <li><a href="/#research">Research</a></li>
      <li><a href="/#cv">CV</a></li>
      <li><a href="/blog/">Writing</a></li>
      <li><a href="/#contact">Contact</a></li>
    </ul>
  </div>
</header>

<main>
{{ content }}
</main>

<footer>
  <div class="wrap foot-inner">
    <span>© <span id="yr"></span> Carl Rippon</span>
    <span>Pointe-à-Pitre · Guadeloupe</span>
  </div>
</footer>

<script>
  document.getElementById('yr').textContent = new Date().getFullYear();
  var toggle = document.querySelector('.nav-toggle');
  var links = document.getElementById('nav-links');
  toggle.addEventListener('click', function(){
    var open = links.classList.toggle('open');
    toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
  });
</script>
</body>
</html>
