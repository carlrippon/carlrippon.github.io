---
layout: default
---
<article class="post">
  <div class="wrap">
    <a class="backlink" href="/blog/">← All notes</a>
    <p class="post-date">{{ page.date | date: "%B %-d, %Y" }}</p>
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-body">
      {{ content }}
    </div>
    <a class="backlink" href="/blog/">← All notes</a>
  </div>
</article>
